<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blind Navigation - 智能盲人导航系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Anthropic 风格暖色系 */
    --bg-cream: #F5F1E8;
    --bg-warm: #EDE8DC;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6560;
    --text-muted: #9A958F;
    --accent-orange: #E85D04;
    --accent-orange-soft: #FFF0E8;
    --border-warm: #D4CFC5;
    --card-bg: #FAF7F2;
    --success: #4A7C59;
    --error: #C5453A;
  }

  * { box-sizing: border-box }

  body {
    margin: 0;
    background: var(--bg-cream);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 标题使用衬线体 */
  h1, h2, h3, h4 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: normal;
    margin: 0;
  }

  /* 主布局 */
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    height: 100vh;
    padding: 24px;
  }

  /* 左侧主舞台 */
  .stage {
    position: relative;
    border-radius: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border-warm);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .canvas-wrap, #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
  }

  /* 右上角状态浮窗 */
  .status-float {
    position: absolute;
    right: 16px;
    top: 16px;
    z-index: 30;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    max-width: 400px;
  }

  .badge {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--bg-cream);
    border: 1px solid var(--border-warm);
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .badge.ok {
    color: var(--success);
    border-color: #A8C5B8;
    background: #F0F7F4;
  }

  .badge.err {
    color: var(--error);
    border-color: #E5B8B3;
    background: #FFF0E8;
  }

  /* 右侧聊天面板 */
  .chat {
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border-warm);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06);
    overflow: hidden;
    height: 100%;
  }

  /* 聊天头部 */
  .chat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-warm);
    background: var(--bg-cream);
  }

  .chat-head h2 {
    font-size: 18px;
    color: var(--text-primary);
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  button {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border-warm);
    background: var(--bg-cream);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:hover {
    background: var(--bg-warm);
    border-color: var(--text-muted);
  }

  button.primary {
    background: var(--accent-orange);
    border-color: var(--accent-orange);
    color: #FFF;
  }

  button.primary:hover {
    background: #D54E00;
  }

  button.ghost {
    background: transparent;
    border-color: var(--border-warm);
    color: var(--text-secondary);
  }

  /* 聊天内容区 */
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }

  .chat-list::-webkit-scrollbar {
    width: 6px;
  }

  .chat-list::-webkit-scrollbar-thumb {
    background: var(--border-warm);
    border-radius: 3px;
  }

  .chat-list::-webkit-scrollbar-track {
    background: transparent;
  }

  /* 流式识别区域 */
  .live {
    padding: 16px;
    border: 1px dashed var(--border-warm);
    border-radius: 12px;
    background: var(--bg-cream);
  }

  .live h2 {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .partial {
    font-size: 18px;
    min-height: 2.2em;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .partial .placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  /* 最终文本区域 */
  .finals {
    padding: 16px;
    border: 1px solid var(--border-warm);
    border-radius: 12px;
    background: var(--bg-cream);
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .finals h2 {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .finals ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    flex: 1;
  }

  /* 消息气泡 */
  .bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .from-bot {
    align-self: flex-start;
    background: var(--bg-warm);
    border: 1px solid var(--border-warm);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .from-me {
    align-self: flex-end;
    background: var(--accent-orange-soft);
    border: 1px solid #FFD4C2;
    color: var(--text-primary);
    border-bottom-right-radius: 4px;
  }

  /* 隐藏的控件（供 JS 使用） */
  .hidden-controls {
    display: none;
  }

  /* 响应式 */
  @media (max-width: 1100px) {
    .app {
      grid-template-columns: 1fr;
      height: auto;
    }
    .chat {
      height: 500px;
    }
  }

  /* 页面标题 */
  .page-title {
    font-size: 24px;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .page-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="app">
  <!-- 左侧主舞台 -->
  <section class="stage">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="canvasHint" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;pointer-events:none;text-align:center;padding:20px">📷 正在启动电脑摄像头…</div>
    </div>

    <!-- 右上角状态浮窗 -->
    <div class="status-float">
      <span id="camStatus" class="badge">Camera: 连接中…</span>
      <span id="asrStatus" class="badge">ASR: 连接中…</span>
      <span id="fps" class="badge">FPS: --</span>
    </div>
  </section>

  <!-- 右侧聊天面板 -->
  <aside class="chat">
    <div class="chat-head">
      <div>
        <h2>导航助手</h2>
        <span class="page-subtitle">智能语音交互</span>
      </div>
      <div class="controls">
        <button class="ghost" id="btnWebcam">电脑摄像头</button>
        <button class="ghost" id="btnClear">清空记录</button>
        <button class="ghost" id="btnReconnect">连接 ESP32</button>
      </div>
    </div>

    <div class="chat-list">
      <!-- 流式识别 -->
      <div class="live">
        <h2>实时识别</h2>
        <div class="partial" id="partial">
          <span class="placeholder">等待语音输入…</span>
        </div>
      </div>

      <!-- 最终结果 -->
      <div class="finals">
        <h2>对话记录</h2>
        <ul id="finalList"></ul>
      </div>
    </div>
  </aside>
</div>

<!-- 隐藏控件（供 main.js 使用） -->
<div class="hidden-controls">
  <button id="btn_zero"></button>
  <button id="btn_reset"></button>
  <button id="btn_bias_now"></button>
  <input id="auto_rezero" type="checkbox" checked />
  <input id="auto_bias" type="checkbox" checked />
  <input id="use_proj" type="checkbox" checked />
  <input id="freeze_still" type="checkbox" checked />
  <select id="medn"><option>3</option><option selected>5</option><option>7</option></select>
  <select id="ang_ema"><option value="0">0</option><option value="0.15" selected>0.15</option><option value="0.30">0.30</option><option value="0.5">0.5</option></select>
  <select id="grav_beta"><option value="0.95">0.95</option><option value="0.97">0.97</option><option value="0.98" selected>0.98</option><option value="0.99">0.99</option></select>
  <select id="yaw_db"><option value="0.05">0.05</option><option value="0.08" selected>0.08</option><option value="0.15">0.15</option><option value="0.30">0.30</option></select>
  <select id="still_w"><option value="0.4" selected>0.4</option><option value="0.6">0.6</option><option value="1.0">1.0</option></select>
  <select id="yaw_leak"><option value="0">0</option><option value="0.1">0.1</option><option value="0.2" selected>0.2</option><option value="0.5">0.5</option></select>
  <input id="roll_sl" type="range"><span id="roll_val"></span>
  <input id="pitch_sl" type="range"><span id="pitch_val"></span>
  <input id="yaw_sl" type="range"><span id="yaw_val"></span>
  <input id="gx_sl" type="range"><span id="gx_val"></span>
  <input id="gy_sl" type="range"><span id="gy_val"></span>
  <input id="gz_sl" type="range"><span id="gz_val"></span>
  <input id="ax_sl" type="range"><span id="ax_val"></span>
  <input id="ay_sl" type="range"><span id="ay_val"></span>
  <input id="az_sl" type="range"><span id="az_val"></span>
</div>

<!-- 主脚本 -->
<script type="module" src="/static/main.js"></script>
</body>
</html>
